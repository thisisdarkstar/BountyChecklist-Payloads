<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounty Hub | thisisdarkstar</title>
    <style>
        :root {
            --bg: #f4f4f9;
            --card: #ffffff;
            --primary: #2c3e50;
            --accent: #58a6ff;
            --border: #d0d7de;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: var(--bg);
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }
        h1 { color: var(--primary); margin-top: 0; font-weight: 800; }
        p { color: #57606a; }
        
        .nav-card {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f6f8fa;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-text h3 { margin: 0; font-size: 1.1rem; }
        
        .btn {
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #4091f1;
        }
        hr { border: 0; border-top: 1px solid var(--border); margin: 2rem 0; }
        code { background: #eff1f3; padding: 3px 6px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello.</h1>
        <p>This repository hosts security research tools and payloads for bug bounty hunting.</p>
        
        <div class="nav-card">
            <div class="nav-text">
                <h3>Payload Directory</h3>
                <p style="margin: 5px 0 0 0; font-size: 0.9rem;">Access the <code>/payloads</code> path for raw assets.</p>
            </div>
            <a href="payloads/" class="btn">Browse Path →</a>
        </div>

        <hr>
        <p>Current Status: <strong style="color: #2da44e;">● Active</strong></p>
    </div>
</body>
</html>
